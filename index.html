<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Zhaojuntao Zhao</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
    background: #020617;
    color: white;
    overflow-x: hidden;
}

/* 鼠标光效 */
.cursor-glow {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(56,189,248,0.25), transparent 60%);
    pointer-events: none;
    transform: translate(-50%, -50%);
    z-index: 1;
}

/* 背景 */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent),
                radial-gradient(circle at 80% 80%, #0ea5e9, transparent);
    z-index: 0;
}

/* 容器 */
.container {
    max-width: 1100px;
    margin: auto;
    padding: 80px 20px;
    position: relative;
    z-index: 2;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    gap: 40px;
    flex-wrap: wrap;
}

.avatar {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    border: 3px solid #38bdf8;
    object-fit: cover;
}

.hero-text h1 {
    font-size: 52px;
}

.subtitle {
    color: #38bdf8;
    margin-top: 10px;
    font-size: 20px;
}

.desc {
    margin-top: 10px;
    color: #94a3b8;
}

/* 按钮 */
.button {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 20px;
    border-radius: 10px;
    background: linear-gradient(90deg, #38bdf8, #6366f1);
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

.button:hover {
    transform: scale(1.05);
    box-shadow: 0 0 20px rgba(56,189,248,0.6);
}

/* 标题 */
h2 {
    margin-top: 60px;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.06);
    border-radius: 20px;
    padding: 25px;
    margin-top: 20px;
    backdrop-filter: blur(15px);
}

/* 网格 */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
}

/* 项目 */
.project {
    background: rgba(255,255,255,0.05);
    padding: 20px;
    border-radius: 16px;
    transition: 0.3s;
}

.project:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.1);
}

.project-title {
    font-weight: bold;
    margin-bottom: 10px;
}

.tag {
    display: inline-block;
    font-size: 12px;
    padding: 4px 8px;
    background: #1e293b;
    border-radius: 6px;
    margin-top: 5px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="cursor-glow" id="glow"></div>

<div class="container">

    <!-- HERO -->
    <div class="hero">
        <img src="avatar.jpg" class="avatar">

        <div class="hero-text">
            <h1>赵骏涛</h1>
            <div class="subtitle">AI × Materials Science</div>
            <p class="desc">
                Building intelligent systems for next-generation materials.
            </p>
            <a class="button" href="#">View My Work</a>
        </div>
    </div>

    <!-- ABOUT -->
    <h2>About</h2>
    <div class="card">
        我专注于AI驱动的材料设计，研究GNN、多尺度建模与电池体系。
    </div>

    <!-- SKILLS -->
    <h2>What I Do</h2>
    <div class="grid">
        <div class="card">Graph Neural Networks</div>
        <div class="card">Multiscale Modeling</div>
        <div class="card">Battery Materials</div>
        <div class="card">AI for Science</div>
    </div>

</div>

<script>
const glow = document.getElementById("glow");

document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
});
</script>

</body>
</html>
